# Render Blueprint für das Aurora-Backend (FastAPI + MongoDB Atlas + Stripe)
# Anleitung: render.com -> New -> Blueprint -> dieses Repo wählen.
# Die mit "sync: false" markierten Werte trägst du im Render-Dashboard ein (Secrets).
services:
  - type: web
    name: aurora-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DB_NAME
        value: aurora
      - key: MONGO_URL          # MongoDB-Atlas Connection-String (Secret)
        sync: false
      - key: JWT_SECRET         # langer Zufallsstring
        sync: false
      - key: STRIPE_API_KEY     # sk_live_... oder sk_test_...
        sync: false
      - key: STRIPE_WEBHOOK_SECRET  # whsec_...
        sync: false
      - key: ADMIN_PASSWORD     # starkes Admin-Passwort
        sync: false
      - key: CORS_ORIGINS       # z.B. https://auroa-therapiezentrum-website.vercel.app,https://www.aurora-therapiezentrum.de
        sync: false
      - key: RESEND_API_KEY     # optional (E-Mails); leer lassen = keine Mails
        sync: false
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: ADMIN_EMAIL
        value: info@aurora-therapiezentrum.de
