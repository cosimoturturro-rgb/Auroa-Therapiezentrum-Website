# Render Blueprint für das Aurora-Backend (FastAPI + MongoDB Atlas)
# render.com -> New -> Blueprint -> dieses Repo wählen.
# Render fragt beim Anlegen nur nach MONGO_URL und ADMIN_PASSWORD.
# Stripe-Keys tragen wir später im Render-Dashboard nach (Schritt 4).
services:
  - type: web
    name: aurora-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DB_NAME
        value: aurora
      - key: CORS_ORIGINS
        value: "https://auroa-therapiezentrum-website.vercel.app"
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: ADMIN_EMAIL
        value: info@aurora-therapiezentrum.de
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
